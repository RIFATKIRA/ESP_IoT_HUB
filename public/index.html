<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ESP32 IoT Control Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;900&display=swap" rel="stylesheet"/>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{
  --bg:#0a0c10;--bg2:#0f1218;--bg3:#151a22;--bg4:#0d1117;
  --border:#1e2a38;--border2:#263344;
  --accent:#00d4ff;--accent2:#0088aa;
  --green:#00ff88;--green2:#00aa55;
  --red:#ff4466;--red2:#aa2233;
  --amber:#ffaa00;--inactive:#ff8c00;
  --text:#c8d8e8;--text2:#7a9ab8;--text3:#3a5a78;
  --mono:'Share Tech Mono',monospace;
  --ui:'Rajdhani',sans-serif;
  --head:'Orbitron',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--ui);font-size:15px;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.012) 2px,rgba(0,212,255,.012) 4px);pointer-events:none;z-index:1000}

/* ── HEADER ─────────────────────────────────────────────────────── */
header{display:flex;align-items:center;justify-content:space-between;padding:13px 26px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:13px}
.logo-box{width:34px;height:34px;border:2px solid var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:10px;color:var(--accent);box-shadow:0 0 10px rgba(0,212,255,.3)}
.logo-text{font-family:var(--head);font-size:15px;font-weight:600;color:var(--accent);letter-spacing:3px}
.logo-sub{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;margin-top:2px}
.hdr-r{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ws-pill{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--text2)}
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2s ease-in-out infinite}
.ws-dot.off{background:var(--red);box-shadow:0 0 5px var(--red);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.chip{padding:3px 9px;border:1px solid var(--border2);border-radius:3px;font-family:var(--mono);font-size:10px;color:var(--text2);background:var(--bg3)}
.chip span{color:var(--accent);font-weight:bold}
.user-lbl{font-family:var(--mono);font-size:10px;color:var(--text3)}
.logout-btn{padding:4px 11px;border:1px solid var(--border2);border-radius:4px;background:transparent;color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--red2);color:var(--red)}

/* ── MAIN ───────────────────────────────────────────────────────── */
main{padding:22px 26px;max-width:1700px;margin:0 auto}

/* ── STATS ──────────────────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 16px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
.sc-lbl{font-size:8px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;font-family:var(--mono);margin-bottom:5px}
.sc-val{font-family:var(--head);font-size:24px;font-weight:900;color:var(--accent);line-height:1}
.sc-val.g{color:var(--green)}.sc-val.r{color:var(--red)}.sc-val.a{color:var(--amber)}.sc-val.p{color:#aa88ff}

/* ── SECTION TITLE ──────────────────────────────────────────────── */
.sec-t{font-family:var(--head);font-size:9px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-t::before{content:'';width:18px;height:1px;background:var(--accent);display:inline-block}

/* ── DEVICE GRID ────────────────────────────────────────────────── */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:14px}

/* ── DEVICE CARD ────────────────────────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .3s,box-shadow .3s;animation:ci .3s ease both}
@keyframes ci{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card.st-online{border-color:rgba(0,255,136,.2);box-shadow:0 0 14px rgba(0,255,136,.04)}
.card.st-inactive{border-color:rgba(255,140,0,.2)}
.card.st-offline{opacity:.6}

/* Card header */
.ch{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.ch-name{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all .3s}
.sdot.online{background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 2s infinite}
.sdot.inactive{background:var(--inactive);animation:blink 1s infinite}
.sdot.offline{background:var(--border2)}
.dname{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.dname:hover{color:var(--accent)}
.dname-inp{background:transparent;border:none;border-bottom:1px solid var(--accent);color:var(--accent);font-family:var(--ui);font-size:14px;font-weight:600;outline:none;width:150px}
.sbadge{padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.sbadge.online{background:rgba(0,255,136,.1);border:1px solid var(--green2);color:var(--green)}
.sbadge.inactive{background:rgba(255,140,0,.1);border:1px solid var(--inactive);color:var(--inactive)}
.sbadge.offline{background:rgba(255,68,102,.1);border:1px solid var(--red2);color:var(--red)}
.cbtns{display:flex;gap:4px;margin-left:8px}
.ibtn{width:26px;height:26px;border:1px solid var(--border2);background:var(--bg);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;transition:all .2s}
.ibtn:hover{border-color:var(--red2);color:var(--red)}
.ibtn.edit:hover{border-color:var(--accent2);color:var(--accent)}

/* Identity row */
.cid{padding:8px 13px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ci-item{display:flex;flex-direction:column;gap:2px}
.ci-lbl{font-size:8px;letter-spacing:1.5px;color:var(--text3);font-family:var(--mono);text-transform:uppercase}
.ci-val{font-family:var(--mono);font-size:11px;color:var(--text2)}
.ci-val.hi{color:var(--accent)}

/* ── SYSTEM METRICS (4-box, 2-line each) ─────────────────────────
   RSSI | FREE HEAP | UPTIME | CPU TEMP — compact, no sensor blocks  */
.sysm{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.sm{background:var(--bg4);padding:7px 10px;display:flex;flex-direction:column;gap:3px}
.sm-lbl{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase}
.sm-val{font-family:var(--mono);font-size:13px;color:var(--text2);font-weight:bold;line-height:1.1}
.sm-val.ok{color:var(--green)}.sm-val.warn{color:var(--amber)}.sm-val.bad{color:var(--red)}
.sig{display:flex;align-items:center;gap:4px}
.sigb{display:flex;align-items:flex-end;gap:2px;height:11px}
.sigb span{width:3px;border-radius:1px;background:var(--border2)}
.sigb span.on{background:var(--green)}

/* ── SENSOR SECTION ──────────────────────────────────────────────
   One block per physical sensor (DHT22, BME280, etc.)
   Shows "NO SENSOR CONNECTED" when device has no environmental sensors.
   Shows "READ FAILED" if sensor is attached but read failed (ok=false). */
.sens{border-top:1px solid var(--border)}
.sblk{padding:10px 13px;border-bottom:1px dashed var(--border)}
.sblk:last-child{border-bottom:none}
.shdr{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sico{font-size:12px}
.stit{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase}
.sokb{margin-left:auto;font-family:var(--mono);font-size:8px;padding:1px 6px;border-radius:2px;letter-spacing:1px}
.sokb.ok{color:var(--green2);border:1px solid var(--green2)}
.sokb.err{color:var(--red2);border:1px solid var(--red2)}
.sfields{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:6px}
.sf{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 8px}
.sf-l{font-size:8px;letter-spacing:1px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;margin-bottom:2px}
.sf-v{font-family:var(--mono);font-size:16px;font-weight:bold;color:var(--accent);line-height:1}
.sf-v.g{color:var(--green)}.sf-v.a{color:var(--amber)}
.sf-u{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.serr{font-family:var(--mono);font-size:10px;color:var(--red2)}
.nosens{padding:10px 13px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border)}
.nosens-ico{font-size:14px;opacity:.4}
.nosens-txt{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1px}

/* ── RELAY SECTION ───────────────────────────────────────────────── */
.rels{padding:11px 13px}
.rel-t{font-size:8px;letter-spacing:2px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;margin-bottom:9px}
.rel-list{display:flex;flex-direction:column;gap:6px}
.rrow{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid var(--border);border-radius:5px;background:var(--bg);transition:border-color .2s}
.rrow:hover{border-color:var(--border2)}
.rrow.on{border-color:rgba(0,255,136,.25)}
.ridx{font-family:var(--mono);font-size:9px;color:var(--text3);width:18px;text-align:center;flex-shrink:0}
.rname{flex:1;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rname:hover{color:var(--text)}
.rname-inp{flex:1;background:transparent;border:none;border-bottom:1px solid var(--accent);color:var(--text);font-family:var(--ui);font-size:12px;outline:none}
.rlbl{font-family:var(--mono);font-size:9px;letter-spacing:1px;width:24px;text-align:center;flex-shrink:0}
.rlbl.on{color:var(--green)}.rlbl.off{color:var(--text3)}
.tog{position:relative;width:40px;height:20px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-t{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;cursor:pointer;transition:all .22s}
.tog-t::before{content:'';position:absolute;left:3px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--text3);transition:all .22s}
.tog input:checked+.tog-t{background:rgba(0,255,136,.15);border-color:var(--green2);box-shadow:0 0 7px rgba(0,255,136,.3)}
.tog input:checked+.tog-t::before{transform:translateX(20px);background:var(--green)}
.tog input:disabled+.tog-t{opacity:.35;cursor:not-allowed}

/* Card footer */
.cf{padding:6px 13px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ls{font-family:var(--mono);font-size:9px;color:var(--text3)}
.ctag{font-family:var(--mono);font-size:8px;letter-spacing:1px;color:var(--accent2);background:rgba(0,136,170,.1);border:1px solid rgba(0,136,170,.3);padding:2px 6px;border-radius:3px}

/* ── EMPTY STATE ─────────────────────────────────────────────────── */
.empty{grid-column:1/-1;text-align:center;padding:70px 20px;border:1px dashed var(--border2);border-radius:8px}
.empty-ico{font-size:44px;margin-bottom:14px;opacity:.35;filter:grayscale(1)}
.empty-t{font-family:var(--head);font-size:12px;letter-spacing:4px;color:var(--text3);margin-bottom:7px}
.empty-d{font-family:var(--mono);font-size:11px;color:var(--text3);line-height:1.8}
.empty-d code{color:var(--accent);background:rgba(0,212,255,.08);padding:1px 5px;border-radius:3px}

/* ── TOAST ───────────────────────────────────────────────────────── */
#toasts{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{padding:9px 13px;background:var(--bg3);border:1px solid var(--border2);border-left:3px solid var(--accent);border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--text);animation:tin .28s ease;min-width:200px}
.toast.ok{border-left-color:var(--green)}
.toast.err{border-left-color:var(--red)}
@keyframes tin{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}

@media(max-width:900px){.stats-row{grid-template-columns:repeat(3,1fr)}.dg{grid-template-columns:1fr}.hdr-r{display:none}}
@media(max-width:520px){.stats-row{grid-template-columns:repeat(2,1fr)}.sysm{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-box">IOT</div>
    <div><div class="logo-text">ESP32 · HUB</div><div class="logo-sub">DEVICE MANAGEMENT SYSTEM</div></div>
  </div>
  <div class="hdr-r">
    <div class="ws-pill"><div class="ws-dot" id="wsd"></div><span id="wst">CONNECTING</span></div>
    <div class="chip">DEVICES <span id="hd-tot">0</span></div>
    <div class="chip">ONLINE <span id="hd-on">0</span></div>
    <div class="chip" id="hd-clk">--:--:--</div>
    <span class="user-lbl" id="user-email"></span>
    <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
  </div>
</header>

<main>
  <div class="stats-row">
    <div class="sc"><div class="sc-lbl">Total Devices</div><div class="sc-val" id="st-tot">0</div></div>
    <div class="sc"><div class="sc-lbl">Online</div><div class="sc-val g" id="st-on">0</div></div>
    <div class="sc"><div class="sc-lbl">Offline</div><div class="sc-val r" id="st-off">0</div></div>
    <div class="sc"><div class="sc-lbl">Active Relays</div><div class="sc-val a" id="st-rel">0</div></div>
    <div class="sc"><div class="sc-lbl">Sensor Readings</div><div class="sc-val p" id="st-sens">0</div></div>
  </div>
  <div class="sec-t">Registered Devices</div>
  <div class="dg" id="grid"></div>
</main>
<div id="toasts"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  SENSOR CONFIG — add new sensors here as you connect them
//  key    = sensor name stored in d.sensors (by esp.js upsertSensor)
//  label  = display name shown on card
//  unit   = unit string
//  color  = CSS class for the value: "" | "g" | "a"
// ═══════════════════════════════════════════════════════════════════
const SENSOR_DEFS = {
  // ── DHT22 / DHT11 ─────────────────────────────────────────
  "Ambient Temp": { group:"DHT22", label:"Temp",       unit:"°C", color:"a", icon:"🌡️" },
  "Humidity":     { group:"DHT22", label:"Humidity",   unit:"%",  color:"g", icon:"🌡️" },
  "Heat Index":   { group:"DHT22", label:"Feels Like", unit:"°C", color:"a", icon:"🌡️" },
  // ── BME280 (add if you wire one) ──────────────────────────
  // "BME Temp":     { group:"BME280", label:"Temp",     unit:"°C",  color:"a", icon:"🌦️" },
  // "BME Humidity": { group:"BME280", label:"Humidity", unit:"%",   color:"g", icon:"🌦️" },
  // "Pressure":     { group:"BME280", label:"Pressure", unit:"hPa", color:"",  icon:"🌦️" },
};

// Sensor names that are system metrics → shown in compact row, NOT as sensor blocks
const SYS = new Set(["WiFi RSSI","Free Heap","Uptime","CPU Temp"]);

// ── Accessors: all data lives in d.sensors array ──────────────────
function getSens(d, name)  { return d.sensors?.find(s => s.name === name) || null; }
function getSensVal(d, name) {
  const s = getSens(d, name);
  if (!s || s.value == null) return null;
  return typeof s.value === "number" ? s.value : parseFloat(s.value);
}

function getRssi(d)    { const s = getSens(d,"WiFi RSSI"); return s ? s.value : null; }
function getHeap(d)    { const v = getSensVal(d,"Free Heap"); return v != null ? (v/1024).toFixed(1)+" KB" : "—"; }
function getUptime(d)  { const v = getSensVal(d,"Uptime");    return v != null ? fmtUp(v) : "—"; }
function getCpuT(d)    { const v = getSensVal(d,"CPU Temp");  return v != null ? v.toFixed(1)+"°C" : "—"; }
function getIp(d)      { return d.ipAddress || d.ip || "—"; }
function getMac(d)     { return d.macAddress || d.mac || "N/A"; }
function getFw(d)      { return d.firmware?.version || d.firmwareVersion || "—"; }
function getChip(d)    { return d.type || d.chipModel || "ESP32"; }

// Determine canonical status from virtual field or compute client-side
function devSt(d) {
  if (d.status === "online" || d.status === "inactive" || d.status === "offline") return d.status;
  if (!d.online) return "offline";
  return (Date.now() - new Date(d.lastSeen)) > 35000 ? "inactive" : "online";
}

// Count non-null environmental sensor values across all devices
function countSensors() {
  return Object.values(devices).reduce((acc, d) => {
    if (!d.sensors) return acc;
    return acc + d.sensors.filter(s => !SYS.has(s.name) && s.value != null).length;
  }, 0);
}

// ── Formatters ────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fmtUp(s) {
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h>0?`${h}h ${m}m`:m>0?`${m}m ${sec}s`:`${sec}s`;
}
function fmtAgo(date) {
  if (!date) return "never";
  const d=Math.floor((Date.now()-new Date(date))/1000);
  if(d<5)return"just now";if(d<60)return`${d}s ago`;
  if(d<3600)return`${Math.floor(d/60)}m ago`;return`${Math.floor(d/3600)}h ago`;
}
function sigBars(rssi) {
  const b=rssi==null?0:rssi>=-50?4:rssi>=-60?3:rssi>=-70?2:rssi>=-80?1:0;
  return[8,11,14,17].map((h,i)=>`<span style="height:${h}px" class="${i<b?"on":""}"></span>`).join("");
}
function rssiCls(r) { return r==null?"":r>=-60?"ok":r>=-75?"warn":"bad"; }

// ── Sensor section HTML ───────────────────────────────────────────
// Groups related sensor readings (Ambient Temp + Humidity + Heat Index)
// into labelled blocks. Works by name-lookup — no "group" field required.
function sensorSectionHTML(d) {
  if (!d.sensors) return noSensorHTML();

  // Build groups from the SENSOR_DEFS registry
  const groups = {};
  for (const [sName, def] of Object.entries(SENSOR_DEFS)) {
    const s = getSens(d, sName);
    if (!s) continue; // sensor not attached/not yet sent
    if (!groups[def.group]) groups[def.group] = { icon: def.icon, readings: [] };
    groups[def.group].readings.push({ label: def.label, unit: def.unit, color: def.color, value: s.value });
  }

  const keys = Object.keys(groups);
  if (!keys.length) return noSensorHTML();

  return `<div class="sens">${keys.map(g => {
    const grp  = groups[g];
    const anyOk = grp.readings.some(r => r.value != null);
    const okBadge = `<span class="sokb ${anyOk?"ok":"err"}">${anyOk?"OK":"ERR"}</span>`;
    const hdr = `<div class="shdr"><span class="sico">${grp.icon}</span><span class="stit">${esc(g)}</span>${okBadge}</div>`;
    if (!anyOk) return `<div class="sblk">${hdr}<div class="serr">Read failed — check wiring / timing</div></div>`;
    const fields = grp.readings.filter(r=>r.value!=null).map(r=>`
      <div class="sf">
        <div class="sf-l">${esc(r.label)}</div>
        <div class="sf-v ${r.color}">${typeof r.value==="number"?r.value.toFixed(1):parseFloat(r.value).toFixed(1)}</div>
        <div class="sf-u">${esc(r.unit)}</div>
      </div>`).join("");
    return `<div class="sblk">${hdr}<div class="sfields">${fields}</div></div>`;
  }).join("")}</div>`;
}

function noSensorHTML() {
  return `<div class="nosens"><span class="nosens-ico">📟</span><span class="nosens-txt">NO SENSOR CONNECTED</span></div>`;
}

// ── Card HTML ─────────────────────────────────────────────────────
function cardHTML(d) {
  const st    = devSt(d);
  const rssi  = getRssi(d);
  const isAdm = currentRole === "admin";
  const relayRows = (d.relays||[]).map(r=>`
    <div class="rrow ${r.state?"on":""}" id="rr-${d.deviceId}-${r.index}">
      <span class="ridx">R${r.index}</span>
      <span class="rname" data-dev="${d.deviceId}" data-rel="${r.index}">${esc(r.name||"Relay "+(r.index+1))}</span>
      <span class="rlbl ${r.state?"on":"off"}">${r.state?"ON":"OFF"}</span>
      <label class="tog">
        <input type="checkbox" ${r.state?"checked":""} ${st!=="online"||!isAdm?"disabled":""}
               data-dev="${d.deviceId}" data-rel="${r.index}">
        <span class="tog-t"></span>
      </label>
    </div>`).join("");

  return `
    <div class="ch">
      <div class="ch-name">
        <div class="sdot ${st}"></div>
        <span class="dname" data-dev="${d.deviceId}">${esc(d.name)}</span>
      </div>
      <span class="sbadge ${st}">${st.toUpperCase()}</span>
      <div class="cbtns">
        <button class="ibtn edit" data-dev="${d.deviceId}" title="Rename">✎</button>
        <button class="ibtn del"  data-dev="${d.deviceId}" title="Remove">✕</button>
      </div>
    </div>

    <div class="cid">
      <div class="ci-item"><span class="ci-lbl">IP</span><span class="ci-val hi">${esc(getIp(d))}</span></div>
      <div class="ci-item"><span class="ci-lbl">MAC</span><span class="ci-val">${esc(getMac(d))}</span></div>
      <div class="ci-item"><span class="ci-lbl">Firmware</span><span class="ci-val">${esc(getFw(d))}</span></div>
    </div>

    <div class="sysm">
      <div class="sm" id="sm-rssi-${d.deviceId}">
        <span class="sm-lbl">RSSI</span>
        <div class="sig"><div class="sigb">${sigBars(rssi)}</div>
        <span class="sm-val ${rssiCls(rssi)}">${rssi!=null?rssi+" dBm":"—"}</span></div>
      </div>
      <div class="sm" id="sm-heap-${d.deviceId}">
        <span class="sm-lbl">FREE HEAP</span>
        <span class="sm-val">${getHeap(d)}</span>
      </div>
      <div class="sm" id="sm-up-${d.deviceId}">
        <span class="sm-lbl">UPTIME</span>
        <span class="sm-val">${getUptime(d)}</span>
      </div>
      <div class="sm" id="sm-cpt-${d.deviceId}">
        <span class="sm-lbl">CPU TEMP</span>
        <span class="sm-val ${parseFloat(getCpuT(d))>60?"warn":""}">${getCpuT(d)}</span>
      </div>
    </div>

    ${sensorSectionHTML(d)}

    <div class="rels">
      <div class="rel-t">Relay Control — ${(d.relays||[]).length} Channel${(d.relays||[]).length!==1?"s":""}</div>
      <div class="rel-list">${relayRows}</div>
    </div>

    <div class="cf">
      <span class="ls">Last seen: ${fmtAgo(d.lastSeen)}</span>
      <span class="ctag">${esc(getChip(d))}</span>
    </div>`;
}

// ── Render all (full rebuild) ─────────────────────────────────────
function renderAll() {
  const grid = document.getElementById("grid");
  const list = Object.values(devices).sort((a,b)=>(devSt(b)==="online"?1:0)-(devSt(a)==="online"?1:0));
  if (!list.length) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-ico">📡</div>
      <div class="empty-t">NO DEVICES REGISTERED</div>
      <div class="empty-d">Flash your ESP32 and it will auto-register via<br/><code>POST /api/esp/register</code></div>
    </div>`;
    updateStats(); return;
  }
  grid.innerHTML = "";
  list.forEach(d => {
    const div = document.createElement("div");
    div.id = `card-${d.deviceId}`;
    div.className = `card st-${devSt(d)}`;
    div.innerHTML = cardHTML(d);
    attachEvents(div, d);
    grid.appendChild(div);
  });
  updateStats();
}

// ── Patch card (no-flicker update) ────────────────────────────────
function patchCard(d) {
  const card = document.getElementById(`card-${d.deviceId}`);
  if (!card) { renderAll(); return; }
  const st  = devSt(d);
  card.className = `card st-${st}`;

  const dot   = card.querySelector(".sdot");
  const badge = card.querySelector(".sbadge");
  if (dot)  { dot.className = `sdot ${st}`; }
  if (badge){ badge.className=`sbadge ${st}`; badge.textContent=st.toUpperCase(); }

  const ip = card.querySelector(".ci-val.hi");
  if (ip) ip.textContent = getIp(d);

  const ls = card.querySelector(".ls");
  if (ls) ls.textContent = `Last seen: ${fmtAgo(d.lastSeen)}`;

  // System metrics — patch by id (safe, no position assumptions)
  const rssi = getRssi(d);
  const rssiBox = document.getElementById(`sm-rssi-${d.deviceId}`);
  if (rssiBox) {
    const sig = rssiBox.querySelector(".sigb"); if (sig) sig.innerHTML = sigBars(rssi);
    const val = rssiBox.querySelector(".sm-val");
    if (val) { val.textContent=rssi!=null?rssi+" dBm":"—"; val.className=`sm-val ${rssiCls(rssi)}`; }
  }
  const heapBox = document.getElementById(`sm-heap-${d.deviceId}`);
  if (heapBox) { const v=heapBox.querySelector(".sm-val"); if(v) v.textContent=getHeap(d); }
  const upBox = document.getElementById(`sm-up-${d.deviceId}`);
  if (upBox)  { const v=upBox.querySelector(".sm-val");  if(v) v.textContent=getUptime(d); }
  const cptBox = document.getElementById(`sm-cpt-${d.deviceId}`);
  if (cptBox) { const v=cptBox.querySelector(".sm-val"); if(v){ v.textContent=getCpuT(d); v.className=`sm-val ${parseFloat(getCpuT(d))>60?"warn":""}`; } }

  // Sensor section — patch individual values by sensor name
  for (const [sName, def] of Object.entries(SENSOR_DEFS)) {
    const s = getSens(d, sName);
    if (!s) continue;
    // Find the field block inside the sensor section
    // We locate it by matching the text of sf-l elements
    const sfEls = card.querySelectorAll(".sf");
    sfEls.forEach(el => {
      const lbl = el.querySelector(".sf-l");
      if (lbl && lbl.textContent === def.label) {
        const valEl = el.querySelector(".sf-v");
        if (valEl && s.value != null) {
          const n = typeof s.value==="number"?s.value:parseFloat(s.value);
          valEl.textContent = n.toFixed(1);
        }
      }
    });
    // Update OK badge
    const grpBlocks = card.querySelectorAll(".sblk");
    grpBlocks.forEach(blk => {
      const t = blk.querySelector(".stit");
      if (t && t.textContent === def.group) {
        const ok = card.querySelectorAll(`.sf`);
        // Check if any reading in this block is non-null
        const anyOk = [...card.querySelectorAll(".sblk")]
          .filter(b=>b.querySelector(".stit")?.textContent===def.group)
          .some(b=>[...b.querySelectorAll(".sf-v")].some(v=>v.textContent&&v.textContent!=="—"));
        const badge = blk.querySelector(".sokb");
        if (badge) { badge.textContent=anyOk?"OK":"ERR"; badge.className=`sokb ${anyOk?"ok":"err"}`; }
      }
    });
  }

  // Relays
  const isAdm = currentRole==="admin";
  (d.relays||[]).forEach(r=>{
    const row=document.getElementById(`rr-${d.deviceId}-${r.index}`);
    if(!row) return;
    const on=!!r.state;
    row.className=`rrow ${on?"on":""}`;
    const tog=row.querySelector("input[type=checkbox]");
    if(tog){if(tog.checked!==on)tog.checked=on;tog.disabled=st!=="online"||!isAdm;}
    const lbl=row.querySelector(".rlbl");
    if(lbl){lbl.textContent=on?"ON":"OFF";lbl.className=`rlbl ${on?"on":"off"}`;}
    const nm=row.querySelector(".rname");
    if(nm){const n=r.name||`Relay ${r.index+1}`;if(nm.textContent!==n)nm.textContent=esc(n);}
  });
}

// ── Stats ─────────────────────────────────────────────────────────
function updateStats() {
  const list   = Object.values(devices);
  const online = list.filter(d=>devSt(d)==="online").length;
  const relays = list.flatMap(d=>d.relays||[]).filter(r=>r.state).length;
  const sens   = countSensors();
  document.getElementById("st-tot").textContent  = list.length;
  document.getElementById("st-on").textContent   = online;
  document.getElementById("st-off").textContent  = list.length-online;
  document.getElementById("st-rel").textContent  = relays;
  document.getElementById("st-sens").textContent = sens;
  document.getElementById("hd-tot").textContent  = list.length;
  document.getElementById("hd-on").textContent   = online;
}

// ── Events ────────────────────────────────────────────────────────
function attachEvents(card, d) {
  card.querySelectorAll(".tog input").forEach(inp=>
    inp.addEventListener("change",e=>{if(!e.target.disabled)relayCmd(e.target.dataset.dev,+e.target.dataset.rel,e.target.checked);}));
  card.querySelectorAll(".ibtn.edit,.dname").forEach(el=>el.addEventListener("click",()=>renameDevice(d.deviceId)));
  const del=card.querySelector(".ibtn.del");
  if(del)del.addEventListener("click",()=>deleteDevice(d.deviceId));
  card.querySelectorAll(".rname").forEach(el=>el.addEventListener("click",()=>renameRelay(el.dataset.dev,+el.dataset.rel)));
}

async function relayCmd(devId, idx, state) {
  if(currentRole!=="admin"){toast("Admin access required","err");return;}
  // Optimistic update
  if(devices[devId]?.relays){const r=devices[devId].relays.find(r=>r.index===idx);if(r)r.state=state;patchCard(devices[devId]);updateStats();}
  try {
    const res=await api("POST",`/api/devices/${devId}/relay`,{relayIndex:idx,state});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    toast(`R${idx} → ${state?"ON":"OFF"}`,state?"ok":"");
  } catch(err){
    toast(`Relay failed: ${err.message}`,"err");
    if(devices[devId]?.relays){const r=devices[devId].relays.find(r=>r.index===idx);if(r)r.state=!state;patchCard(devices[devId]);updateStats();}
  }
}

function renameDevice(devId) {
  const el=document.querySelector(`#card-${devId} .dname`);if(!el)return;
  const prev=el.textContent;
  const inp=document.createElement("input");inp.className="dname-inp";inp.value=prev;
  el.replaceWith(inp);inp.focus();
  const save=async()=>{
    const name=inp.value.trim()||prev;
    await api("PATCH",`/api/devices/${devId}`,{name});
    if(devices[devId])devices[devId].name=name;
  };
  inp.addEventListener("blur",save);
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")inp.blur();if(e.key==="Escape"){inp.value=prev;inp.blur();}});
}

function renameRelay(devId, idx) {
  const el=document.querySelector(`#rr-${devId}-${idx} .rname`);if(!el)return;
  const prev=el.textContent;
  const inp=document.createElement("input");inp.className="rname-inp";inp.value=prev;
  el.replaceWith(inp);inp.focus();
  const save=async()=>{
    const name=inp.value.trim()||prev;
    await api("PATCH",`/api/devices/${devId}/relay/${idx}/name`,{name});
    if(devices[devId]?.relays){const r=devices[devId].relays.find(r=>r.index===idx);if(r)r.name=name;}
  };
  inp.addEventListener("blur",save);
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")inp.blur();if(e.key==="Escape"){inp.value=prev;inp.blur();}});
}

async function deleteDevice(devId) {
  if(!confirm(`Remove device ${devId}?`))return;
  try{await api("DELETE",`/api/devices/${devId}`);delete devices[devId];renderAll();toast("Removed","ok");}
  catch{toast("Delete failed","err");}
}

// ── Auth & API ────────────────────────────────────────────────────
const TOKEN = localStorage.getItem("iot_token");
if (!TOKEN) window.location.href = "/login.html";

let currentRole = "user";
let devices = {};
let pending = new Set();
let rafPending = false;

function api(method, url, body) {
  return fetch(url, {
    method,
    headers: {"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},
    credentials: "include",
    body: body ? JSON.stringify(body) : undefined,
  });
}

fetch("/api/auth/me",{headers:{"Authorization":"Bearer "+TOKEN},credentials:"include"})
  .then(r=>r.ok?r.json():Promise.reject())
  .then(u=>{currentRole=u.role;document.getElementById("user-email").textContent=u.email;})
  .catch(()=>{localStorage.removeItem("iot_token");window.location.href="/login.html";});

async function doLogout(){
  await fetch("/api/auth/logout",{method:"POST",credentials:"include"});
  localStorage.removeItem("iot_token");
  window.location.href="/login.html";
}

// ── Socket.IO ─────────────────────────────────────────────────────
const socket = io({auth:{token:TOKEN}});
socket.on("connect",    ()=>{setWs(true); toast("Connected","ok");});
socket.on("disconnect", ()=>{setWs(false);toast("Disconnected","err");});
socket.on("device:update",  d=>{devices[d.deviceId]=d;schedule(d.deviceId);});
socket.on("device:removed", id=>{delete devices[id];renderAll();});

function setWs(on){
  document.getElementById("wsd").className="ws-dot"+(on?"":" off");
  document.getElementById("wst").textContent=on?"CONNECTED":"DISCONNECTED";
}
function schedule(id){
  pending.add(id);
  if(!rafPending){rafPending=true;requestAnimationFrame(()=>{pending.forEach(i=>{if(devices[i])patchCard(devices[i]);});pending.clear();updateStats();rafPending=false;});}
}

function toast(msg,type=""){
  const el=document.createElement("div");el.className=`toast ${type}`;el.textContent=msg;
  document.getElementById("toasts").appendChild(el);setTimeout(()=>el.remove(),3200);
}

// ── Initial load ──────────────────────────────────────────────────
api("GET","/api/devices").then(r=>r.json()).then(list=>{list.forEach(d=>devices[d.deviceId]=d);renderAll();}).catch(()=>toast("Load failed","err"));

// Clock
setInterval(()=>{document.getElementById("hd-clk").textContent=new Date().toLocaleTimeString("en-GB",{hour12:false});},1000);

// Last-seen + status refresh every 10 s (no server fetch)
setInterval(()=>{
  Object.values(devices).forEach(d=>{
    const el=document.querySelector(`#card-${d.deviceId} .ls`);
    if(el)el.textContent=`Last seen: ${fmtAgo(d.lastSeen)}`;
    const card=document.getElementById(`card-${d.deviceId}`);
    if(card){
      const st=devSt(d);
      card.className=`card st-${st}`;
      const dot=card.querySelector(".sdot");const badge=card.querySelector(".sbadge");
      if(dot)dot.className=`sdot ${st}`;
      if(badge){badge.className=`sbadge ${st}`;badge.textContent=st.toUpperCase();}
    }
  });
},10000);
</script>
